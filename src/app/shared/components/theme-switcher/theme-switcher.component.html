    <button 
      (click)="themeService.toggleTheme()"
      class="p-2.5 rounded-xl border border-gray-200 dark:border-white/10 bg-white/50 dark:bg-white/5 backdrop-blur-md hover:bg-white dark:hover:bg-white/10 transition-all duration-300 group"
      [title]="'Switch to ' + (themeService.theme() === 'light' ? 'dark' : 'light') + ' mode'"
    >
      <!-- Sun icon for light mode (visible when dark) -->
      <svg 
        *ngIf="themeService.theme() === 'dark'"
        class="w-5 h-5 text-yellow-400 group-hover:rotate-45 transition-transform duration-500" 
        fill="none" stroke="currentColor" viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.364l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      
      <!-- Moon icon for dark mode (visible when light) -->
      <svg 
        *ngIf="themeService.theme() === 'light'"
        class="w-5 h-5 text-gray-700 group-hover:-rotate-12 transition-transform duration-500" 
        fill="none" stroke="currentColor" viewBox="0 0 24 24"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
    </button>
