<aside class="hidden md:flex w-64 h-screen flex-col bg-white dark:bg-[#07030f] border-r border-slate-200 dark:border-white/5 transition-colors duration-500 shrink-0">
      <!-- Logo -->
      <div class="p-6 pb-4">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 nova-gradient rounded-xl flex items-center justify-center nova-glow-sm shrink-0">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
          </div>
          <div>
            <span class="text-lg font-black tracking-tight">
              <span class="text-slate-900 dark:text-white">Recharge</span><span class="text-gradient">Nova</span>
            </span>
            <p class="text-[10px] text-slate-400 dark:text-gray-600 font-bold uppercase tracking-widest -mt-0.5">Gateway</p>
          </div>
        </div>
      </div>

      <!-- Divider -->
      <div class="mx-6 h-px bg-slate-200 dark:bg-white/5 mb-4"></div>

      <!-- Nav -->
      <nav class="flex-1 px-3 space-y-1 overflow-y-auto">
        <!-- Main Menu (USER only) -->
        <ng-container *ngIf="authService.currentUser()?.role === 'USER'">
          <p class="px-4 text-[10px] font-bold text-slate-400 dark:text-gray-600 uppercase tracking-widest mb-3">Main Menu</p>

          <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
            <span class="text-sm font-semibold">Dashboard</span>
          </a>

          <a routerLink="/recharge" routerLinkActive="active" class="nav-link">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
            </svg>
            <span class="text-sm font-semibold">Recharge</span>
          </a>

          <a routerLink="/history" routerLinkActive="active" class="nav-link">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <span class="text-sm font-semibold">History</span>
          </a>

          <!-- Spacer between sections -->
          <div class="mt-6"></div>
        </ng-container>

        <!-- Account (Both) -->
        <p class="px-4 text-[10px] font-bold text-slate-400 dark:text-gray-600 uppercase tracking-widest mb-3">Account</p>

        <a routerLink="/profile" routerLinkActive="active" class="nav-link" id="nav-profile">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <span class="text-sm font-semibold">Profile</span>
        </a>

        <!-- Admin Suite -->
        <ng-container *ngIf="authService.currentUser()?.role === 'ADMIN'">
          <p class="px-4 text-[10px] font-bold text-slate-400 dark:text-gray-600 uppercase tracking-widest mt-6 mb-3">Admin Suite</p>
          
          <a routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            <span class="text-sm font-semibold">Admin Panel</span>
            <span class="ml-auto bg-amber-500/20 text-amber-500 text-[10px] font-bold px-2 py-0.5 rounded-full">MANAGE</span>
          </a>

          <a routerLink="/admin/operators" routerLinkActive="active" class="nav-link">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
            <span class="text-sm font-semibold">Operators</span>
          </a>

          <a routerLink="/admin/transactions" routerLinkActive="active" class="nav-link">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="text-sm font-semibold">Transactions</span>
          </a>
        </ng-container>
      </nav>

      <!-- User footer -->
      <div class="p-4 border-t border-slate-200 dark:border-white/5">
        <div *ngIf="authService.currentUser() as user" class="flex items-center gap-3 mb-3 px-2">
          <div class="w-10 h-10 nova-gradient rounded-xl flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-lg shadow-violet-500/10 overflow-hidden">
            <img *ngIf="user.profileImageUrl" [src]="user.profileImageUrl" class="w-full h-full object-cover">
            <span *ngIf="!user.profileImageUrl">{{ user.email[0].toUpperCase() }}</span>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-bold text-slate-800 dark:text-white truncate">{{ userName() || user.email.split('@')[0] }}</p>
            <p class="text-[11px] text-violet-600 dark:text-violet-400 font-black uppercase tracking-tight">{{ user.role }}</p>
          </div>
        </div>

        <button
          (click)="logout()"
          class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-slate-500 dark:text-gray-500 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-600/5 dark:hover:bg-red-500/10 font-bold text-sm transition-all duration-200"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 z-[100] bg-white/90 dark:bg-[#07030f]/90 backdrop-blur-2xl border-t border-slate-200 dark:border-white/10 px-6 py-4 flex items-center justify-between pb-safe">
      
      <!-- User Menu -->
      <ng-container *ngIf="authService.currentUser()?.role === 'USER'">
        <a routerLink="/dashboard" routerLinkActive="text-violet-600 dark:text-violet-400" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center gap-1 text-slate-400 dark:text-gray-500 hover:text-slate-900 dark:hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        </a>

        <a routerLink="/recharge" routerLinkActive="text-violet-600 dark:text-violet-400" class="flex flex-col items-center gap-1 text-slate-400 dark:text-gray-500 hover:text-slate-900 dark:hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
        </a>

        <a routerLink="/history" routerLinkActive="text-violet-600 dark:text-violet-400" class="flex flex-col items-center gap-1 text-slate-400 dark:text-gray-500 hover:text-slate-900 dark:hover:text-white transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        </a>
      </ng-container>

      <!-- Profile (Always visible) -->
      <a routerLink="/profile" routerLinkActive="text-violet-600 dark:text-violet-400" class="flex flex-col items-center gap-1 text-slate-400 dark:text-gray-500 hover:text-slate-900 dark:hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </a>

      <!-- Admin Suite -->
      <ng-container *ngIf="authService.currentUser()?.role === 'ADMIN'">
        <a routerLink="/admin" routerLinkActive="text-amber-500" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center gap-1 text-slate-400 dark:text-gray-500 hover:text-amber-500 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </a>
      </ng-container>

    </nav>
