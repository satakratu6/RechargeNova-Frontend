    <div class="flex h-screen bg-slate-50 dark:bg-[#03010a] overflow-hidden transition-colors duration-500">
      <app-sidebar></app-sidebar>

      <main class="flex-1 overflow-y-auto">
        <!-- Header -->
        <div class="sticky top-0 z-10 px-8 py-5 border-b border-slate-200 dark:border-white/5 flex items-center justify-between bg-slate-50/80 dark:bg-[#03010a]/80 backdrop-blur-xl transition-colors duration-500">
          <div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Notifications</h1>
            <p class="text-sm text-slate-500 dark:text-gray-500 mt-0.5">
              <span *ngIf="!isLoading()">{{ notifications().length }} alerts</span>
              <span *ngIf="isLoading()">Loading...</span>
            </p>
          </div>
          <button (click)="refresh()" [disabled]="isLoading()"
            class="flex items-center gap-2 px-4 py-2.5 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 text-sm font-semibold text-slate-600 dark:text-gray-300 hover:text-violet-600 dark:hover:text-white transition-all disabled:opacity-50">
            <svg class="w-4 h-4" [class.animate-spin]="isLoading()" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            Refresh
          </button>
        </div>

        <div class="p-8 page-enter max-w-2xl mx-auto">
          <!-- Loading skeletons -->
          <div *ngIf="isLoading()" class="space-y-4">
            <div *ngFor="let _ of [1,2,3,4]" class="h-24 rounded-2xl shimmer"></div>
          </div>

          <!-- Empty state -->
          <div *ngIf="!isLoading() && notifications().length === 0"
            class="glass rounded-3xl p-16 text-center border-slate-200 dark:border-white/5">
            <div class="w-20 h-20 bg-slate-100 dark:bg-white/5 rounded-3xl flex items-center justify-center mx-auto mb-6">
              <svg class="w-9 h-9 text-slate-400 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
              </svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800 dark:text-gray-400 mb-2">All caught up!</h3>
            <p class="text-slate-500 dark:text-gray-600 text-sm">No new notifications at the moment.</p>
          </div>

          <!-- Notification list -->
          <div *ngIf="!isLoading() && notifications().length > 0" class="space-y-3">
            <div *ngFor="let note of notifications(); trackBy: trackById"
              class="glass rounded-2xl p-5 flex gap-4 transition-all duration-300 hover:-translate-x-1 group border-slate-100 dark:border-white/5"
              [style.border-left]="note.status === 'SENT' ? '3px solid #7c3aed' : '3px solid #ef4444'">

              <!-- Icon -->
              <div class="w-11 h-11 rounded-xl flex items-center justify-center shrink-0 transition-all"
                [style.background]="note.type === 'EMAIL' ? 'rgba(124,58,237,0.1)' : 'rgba(236,72,153,0.1)'">
                <!-- Email icon -->
                <svg *ngIf="note.type === 'EMAIL'" class="w-5 h-5 text-violet-600 dark:text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
                <!-- SMS icon -->
                <svg *ngIf="note.type !== 'EMAIL'" class="w-5 h-5 text-pink-600 dark:text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                </svg>
              </div>

              <!-- Content -->
              <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between mb-1.5">
                  <span class="text-[10px] font-black uppercase tracking-widest px-2 py-0.5 rounded-md"
                    [style.background]="note.type === 'EMAIL' ? 'rgba(124,58,237,0.1)' : 'rgba(236,72,153,0.1)'"
                    [style.color]="note.type === 'EMAIL' ? '#7c3aed' : '#db2777'">
                    {{ note.type }}
                  </span>
                  <span class="text-xs text-slate-400 dark:text-gray-600 font-medium">{{ note.createdAt }}</span>
                </div>
                <p class="text-sm font-medium text-slate-700 dark:text-gray-300 leading-relaxed">{{ note.message }}</p>
                <div class="mt-2 flex items-center gap-1.5">
                  <div class="w-1.5 h-1.5 rounded-full"
                    [class.bg-emerald-500]="note.status === 'SENT'"
                    [class.bg-rose-500]="note.status !== 'SENT'"></div>
                  <span class="text-[10px] font-bold uppercase tracking-tight"
                    [class.text-emerald-600]="note.status === 'SENT'"
                    [class.dark:text-emerald-400]="note.status === 'SENT'"
                    [class.text-rose-600]="note.status !== 'SENT'"
                    [class.dark:text-rose-400]="note.status !== 'SENT'">
                    {{ note.status }}
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
