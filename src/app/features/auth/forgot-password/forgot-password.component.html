    <div class="min-h-screen bg-slate-50 dark:bg-[#03010a] flex items-center justify-center relative overflow-hidden px-4 transition-colors duration-500">
      <!-- Animated background orbs -->
      <div class="orb w-96 h-96 bg-violet-600/20 dark:bg-violet-600/10 -top-32 -left-32"></div>
      <div class="orb w-80 h-80 bg-pink-500/15 dark:bg-pink-500/10 -bottom-20 -right-20"></div>

      <!-- Grid overlay -->
      <div class="absolute inset-0 dark:bg-[linear-gradient(rgba(124,58,237,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(124,58,237,0.02)_1px,transparent_1px)] bg-[linear-gradient(rgba(124,58,237,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(124,58,237,0.05)_1px,transparent_1px)] bg-[size:64px_64px]"></div>

      <div class="relative w-full max-w-md page-enter z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center gap-3 mb-6 cursor-pointer" routerLink="/">
            <div class="w-12 h-12 nova-gradient rounded-2xl flex items-center justify-center nova-glow">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
            </div>
            <span class="text-2xl font-black tracking-tight">
              <span class="text-slate-900 dark:text-white">Recharge</span><span class="text-gradient">Nova</span>
            </span>
          </div>
          <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Forgot Password</h1>
          <p class="text-slate-500 dark:text-gray-400 text-sm">Follow the steps to reset your password</p>
        </div>

        <div class="glass-strong p-8 rounded-3xl">
          <!-- Step Indicators -->
          <div class="flex items-center justify-between mb-8 px-4">
            <div class="flex flex-col items-center gap-2">
              <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all"
                [class.bg-violet-600]="step >= 1" [class.text-white]="step >= 1"
                [class.bg-slate-200]="step < 1" [class.dark:bg-white/10]="step < 1">1</div>
              <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Email</span>
            </div>
            <div class="flex-1 h-px bg-slate-200 dark:bg-white/10 mx-2 -mt-6"></div>
            <div class="flex flex-col items-center gap-2">
              <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all"
                [class.bg-violet-600]="step >= 2" [class.text-white]="step >= 2"
                [class.bg-slate-200]="step < 2" [class.dark:bg-white/10]="step < 2">2</div>
              <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Verify</span>
            </div>
            <div class="flex-1 h-px bg-slate-200 dark:bg-white/10 mx-2 -mt-6"></div>
            <div class="flex flex-col items-center gap-2">
              <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all"
                [class.bg-violet-600]="step >= 3" [class.text-white]="step >= 3"
                [class.bg-slate-200]="step < 3" [class.dark:bg-white/10]="step < 3">3</div>
              <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">New PW</span>
            </div>
          </div>

          <!-- Error/Success Alerts -->
          <div *ngIf="message" class="mb-5 p-4 rounded-xl border text-sm flex items-center gap-2 animate-shake"
            [class.bg-red-500/10]="isError" [class.border-red-500/20]="isError" [class.text-red-600]="isError"
            [class.bg-emerald-500/10]="!isError" [class.border-emerald-500/20]="!isError" [class.text-emerald-600]="!isError">
            <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path *ngIf="isError" fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
              <path *ngIf="!isError" fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
            {{ message }}
          </div>

          <!-- Step 1: Email Input -->
          <form *ngIf="step === 1" [formGroup]="emailForm" (ngSubmit)="onEmailSubmit()" class="space-y-5">
            <div>
              <label class="block text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-2">Enter Email</label>
              <input type="email" formControlName="email" placeholder="you@example.com" class="input-nova">
            </div>
            <button type="submit" [disabled]="emailForm.invalid || isLoading" class="btn-nova w-full py-3.5 text-sm font-bold tracking-wide">
              <span class="flex items-center justify-center gap-2">
                <span class="spinner" *ngIf="isLoading"></span>
                <span>{{ isLoading ? 'Sending OTP...' : 'Send OTP' }}</span>
              </span>
            </button>
          </form>

          <!-- Step 2: OTP Verification -->
          <form *ngIf="step === 2" [formGroup]="otpForm" (ngSubmit)="onOtpSubmit()" class="space-y-5">
            <div>
              <label class="block text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-2">Enter 6-Digit OTP</label>
              <input type="text" formControlName="otp" placeholder="123456" maxlength="6" class="input-nova text-center text-2xl tracking-[0.5em] font-black">
            </div>
            <button type="submit" [disabled]="otpForm.invalid || isLoading" class="btn-nova w-full py-3.5 text-sm font-bold tracking-wide">
              Verify & Continue
            </button>
            <button type="button" (click)="step = 1" class="w-full text-sm font-bold text-slate-500 hover:text-violet-600 transition-colors">Change Email</button>
          </form>

          <!-- Step 3: New Password -->
          <form *ngIf="step === 3" [formGroup]="passwordForm" (ngSubmit)="onPasswordSubmit()" class="space-y-5">
            <div>
              <label class="block text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-2">New Password</label>
              <input type="password" formControlName="password" placeholder="••••••••" class="input-nova">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-2">Confirm Password</label>
              <input type="password" formControlName="confirmPassword" placeholder="••••••••" class="input-nova">
            </div>
            <button type="submit" [disabled]="passwordForm.invalid || isLoading" class="btn-nova w-full py-3.5 text-sm font-bold tracking-wide">
              {{ isLoading ? 'Updating...' : 'Update Password' }}
            </button>
          </form>

          <div class="mt-8 text-center">
            <a routerLink="/auth/login" class="text-sm font-bold text-violet-600 hover:text-violet-500 transition-colors">← Back to Sign In</a>
          </div>
        </div>
      </div>
    </div>
