    <div class="min-h-screen bg-slate-50 dark:bg-[#03010a] flex items-center justify-center relative overflow-hidden px-4 py-12 transition-colors duration-500">

      <!-- Animated background orbs -->
      <div class="orb w-[500px] h-[500px] bg-violet-600/15 dark:bg-violet-600/10 -top-60 -right-40"></div>
      <div class="orb w-96 h-96 bg-pink-600/10 dark:bg-pink-600/10 -bottom-40 -left-20"></div>

      <!-- Grid overlay -->
      <div class="absolute inset-0 dark:bg-[linear-gradient(rgba(124,58,237,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(124,58,237,0.02)_1px,transparent_1px)] bg-[linear-gradient(rgba(124,58,237,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(124,58,237,0.05)_1px,transparent_1px)] bg-[size:64px_64px]"></div>

      <div class="relative w-full max-w-lg page-enter z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
          <div class="inline-flex items-center gap-3 mb-5 cursor-pointer" routerLink="/">
            <div class="w-12 h-12 nova-gradient rounded-2xl flex items-center justify-center nova-glow">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
            </div>
            <span class="text-2xl font-black tracking-tight">
              <span class="text-slate-900 dark:text-white">Recharge</span><span class="text-gradient">Nova</span>
            </span>
          </div>
          <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-2">Create your account</h1>
          <p class="text-slate-500 dark:text-gray-400 text-sm">Join thousands of users recharging smarter</p>
        </div>

        <!-- Card -->
        <div class="glass-strong p-8 rounded-3xl">
          <!-- Error -->
          <div *ngIf="errorMsg" class="mb-5 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-600 dark:text-red-400 text-sm flex items-center gap-2 animate-shake">
            <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            {{ errorMsg }}
          </div>

          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
            <!-- Name + Phone row -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-2">Full Name</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                  </div>
                  <input id="name" type="text" formControlName="name" placeholder="John Doe" class="input-nova pl-10" [class.!border-red-500/50]="isInvalid('name')">
                </div>
                <div *ngIf="isInvalid('name')" class="mt-1 text-xs text-red-500">Name is required</div>
              </div>
              <div>
                <label class="block text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-2">Phone</label>
                <div class="relative">
                  <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                    </svg>
                  </div>
                  <input id="phoneNumber" type="tel" formControlName="phoneNumber" placeholder="9876543210" class="input-nova pl-10" [class.!border-red-500/50]="isInvalid('phoneNumber')">
                </div>
                <div *ngIf="isInvalid('phoneNumber')" class="mt-1 text-xs text-red-500">Enter a valid 10-digit number</div>
              </div>
            </div>

            <!-- Email -->
            <div>
              <label class="block text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-2">Email Address</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                  <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                  </svg>
                </div>
                <input id="email" type="email" formControlName="email" placeholder="you@example.com" class="input-nova pl-11" [class.!border-red-500/50]="isInvalid('email')">
              </div>
              <div *ngIf="isInvalid('email')" class="mt-1 text-xs text-red-500">Valid email is required</div>
            </div>

            <!-- Password -->
            <div>
              <label class="block text-xs font-bold text-slate-500 dark:text-gray-400 uppercase tracking-widest mb-2">Password</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                  <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                  </svg>
                </div>
                <input id="password" [type]="showPw ? 'text' : 'password'" formControlName="password" placeholder="Min. 6 characters" class="input-nova pl-11 pr-11" [class.!border-red-500/50]="isInvalid('password')">
                <button type="button" (click)="showPw = !showPw" class="absolute inset-y-0 right-4 flex items-center text-gray-400 hover:text-violet-500 transition-colors">
                  <svg *ngIf="!showPw" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                  </svg>
                  <svg *ngIf="showPw" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                  </svg>
                </button>
              </div>
              <div *ngIf="isInvalid('password')" class="mt-1 text-xs text-red-500">Min. 6 characters required</div>
            </div>

            <!-- Submit -->
            <button
              type="submit"
              [disabled]="registerForm.invalid || isLoading"
              class="btn-nova w-full py-3.5 text-sm font-bold tracking-wide disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
            >
              <span class="relative z-10 flex items-center justify-center gap-2">
                <span class="spinner" *ngIf="isLoading"></span>
                <span>{{ isLoading ? 'Creating account...' : 'Create Account' }}</span>
                <svg *ngIf="!isLoading" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
                </svg>
              </span>
            </button>
          </form>

          <div class="flex items-center gap-4 my-6">
            <div class="flex-1 h-px bg-gray-200 dark:bg-white/5"></div>
            <span class="text-xs text-gray-400 font-bold uppercase tracking-widest">OR</span>
            <div class="flex-1 h-px bg-gray-200 dark:bg-white/5"></div>
          </div>

          <p class="text-center text-sm text-slate-500 dark:text-gray-500">
            Already have an account?
            <a routerLink="/auth/login" class="text-violet-600 dark:text-violet-400 font-bold hover:text-violet-500 transition-colors ml-1">
              Sign In →
            </a>
          </p>
        </div>

        <p class="text-center text-xs text-slate-400 dark:text-gray-700 mt-6 font-medium">
          By creating an account you agree to our Terms &amp; Privacy Policy
        </p>
      </div>
    </div>
